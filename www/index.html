.º ESO","materia":"Geografía e Historia","norma":"Orden de 30 de mayo de 2023","fuente":"BOJA núm. 104, de 2 de junio de 2023, Anexos II y III","url":"https://www.juntadeandalucia.es/boja/2023/104/36","status":"revisado"},"niveles":[{"valor":4,"nota":10,"nombre":"Excelente"},{"valor":3,"nota":7.5,"nombre":"Adecuado"},{"valor":2,"nota":5,"nombre":"En proceso"},{"valor":1,"nota":2.5,"nombre":"Inicial"}],"competencias":[{"codigo":"CE1","texto":"Buscar, seleccionar, tratar y organizar información sobre temas relevantes del presente y del pasado, usando críticamente fuentes históricas y geográficas, para adquirir conocimientos, elaborar y expresar contenidos en varios formatos.","descriptores":["CCL2","CCL3","STEM4","CD1","CD2","CC1"]},{"codigo":"CE2","texto":"Indagar, argumentar y elaborar productos propios sobre problemas geográficos, históricos y sociales que resulten relevantes en la actualidad, desde lo local a lo global, para desarrollar un pensamiento crítico, respetuoso con las diferencias, que contribuya a la construcción de la propia identidad y a enriquecer el acervo común.","descriptores":["CCL1","CCL2","CD2","CC1","CC3","CE3","CCEC3"]},{"codigo":"CE3","texto":"Conocer los principales desafíos a los que se han enfrentado distintas sociedades a lo largo del tiempo, identificando las causas y consecuencias de los cambios producidos y los problemas a los que se enfrentan en la actualidad, mediante el desarrollo de proyectos de investigación y el uso de fuentes fiables, para realizar propuestas que contribuyan al desarrollo sostenible.","descriptores":["STEM3","STEM4","STEM5","CPSAA3","CC3","CC4","CE1","CCEC1"]},{"codigo":"CE4","texto":"Identificar y analizar los elementos del paisaje y su articulación en sistemas complejos naturales, rurales y urbanos, así como su evolución en el tiempo, interpretando las causas de las transformaciones y valorando el grado de equilibrio existente en los distintos ecosistemas, para promover su conservación, mejora y uso sostenible.","descriptores":["CPSAA2","CC1","CC2","CC3","CC4","CE1"]},{"codigo":"CE5","texto":"Analizar de forma crítica planteamientos históricos y geográficos explicando la construcción de los sistemas democráticos y los principios constitucionales que rigen la vida en comunidad, así como asumiendo los deberes y derechos propios de nuestro marco de convivencia, para promover la participación ciudadana y la cohesión social.","descriptores":["CCL5","CC1","CC2","CCEC1"]},{"codigo":"CE6","texto":"Comprender los procesos geográficos, históricos y culturales que han conformado la realidad multicultural en la que vivimos, conociendo y difundiendo la historia y cultura de las minorías étnicas presentes en nuestro país, y valorando la aportación de los movimientos en defensa de la igualdad y la inclusión, para reducir estereotipos, evitar cualquier tipo de discriminación y violencia, y reconocer la riqueza de la diversidad.","descriptores":["CCL5","CPSAA3","CC1","CC2","CC3","CCEC1"]},{"codigo":"CE7","texto":"Identificar los fundamentos que sostienen las diversas identidades propias y las ajenas, a través del conocimiento y puesta en valor del patrimonio material e inmaterial que compartimos para conservarlo y respetar los sentimientos de pertenencia, así como para favorecer procesos que contribuyan a la cohesión y solidaridad territorial en orden a los valores del europeísmo y de la Declaración Universal de los Derechos Humanos.","descriptores":["CP3","CPSAA1","CC1","CC2","CC3","CCEC1"]},{"codigo":"CE8","texto":"Tomar conciencia del papel de los ciclos demográficos, el ciclo vital, las formas de vida y las relaciones intergeneracionales y de dependencia en la sociedad actual y su evolución a lo largo del tiempo, analizándolas de forma crítica, para promover alternativas saludables, sostenibles, enriquecedoras y respetuosas con la dignidad humana y el compromiso con la sociedad y el entorno.","descriptores":["STEM5","CD4","CPSAA2","CPSAA5","CC1","CC2","CC3"]},{"codigo":"CE9","texto":"Conocer y valorar la importancia de la seguridad integral ciudadana en la cultura de la convivencia internacional, de nuestro país y de Andalucía, destacando la contribución del Estado, sus instituciones y otras entidades sociales, a la paz, a la cooperación internacional y al desarrollo sostenible, para promover la consecución de un mundo más seguro, solidario, sostenible y justo.","descriptores":["CCL2","CC1","CC2","CC3","CC4","CE1","CCEC1"]}],"criterios":[{"codigo":"1.1","competencia":"CE1","texto":"Elaborar contenidos propios en distintos formatos, mediante aplicaciones y estrategias de recogida y representación de datos sencillas, aprendiendo a usar y contrastar críticamente fuentes fiables, tanto analógicas como digitales, del presente y de la historia contemporánea, identificando la desinformación y la manipulación.","saberes":["GEH.3.A.2","GEH.3.A.3"]},{"codigo":"1.2","competencia":"CE1","texto":"Establecer conexiones y relaciones básicas entre los conocimientos e informaciones adquiridos, elaborando síntesis explicativas sencillas, mediante informes, estudios o dosieres informativos, que reflejen un dominio de los contenidos tratados.","saberes":["GEH.3.A.3"]},{"codigo":"1.3","competencia":"CE1","texto":"Transferir de manera sencilla la información y el conocimiento por medio de narraciones, pósteres, presentaciones, exposiciones orales, medios audiovisuales y otros productos.","saberes":["GEH.3.A.3"]},{"codigo":"2.1","competencia":"CE2","texto":"Generar productos originales y creativos sencillos mediante la organización de conocimientos previos utilizando herramientas de investigación sencillas que permitan explicar problemas presentes y pasados de la humanidad a distintas escalas temporales y espaciales, partiendo del entorno más cercano, utilizando conceptos, situaciones y datos relevantes.","saberes":["GEH.3.A.3","GEH.3.A.4","GEH.3.B.1"]},{"codigo":"2.2","competencia":"CE2","texto":"Construir la propia identidad y enriquecer el acervo común en el contexto del mundo actual, de sus retos y conflictos, desde una perspectiva sistémica y global, iniciándose en la producción y expresión discursiva y abierta al diálogo de juicios y planteamientos personales, críticos y argumentados.","saberes":["GEH.3.B.3"]},{"codigo":"3.1","competencia":"CE3","texto":"Conocer los Objetivos de Desarrollo Sostenible, planteando propuestas que contribuyan a su logro, aplicando métodos y proyectos de investigación, incidiendo en el uso de mapas y otras representaciones gráficas, así como de medios accesibles de interpretación de imágenes.","saberes":["GEH.3.A.1","GEH.3.A.3"]},{"codigo":"3.2","competencia":"CE3","texto":"Identificar, desde un enfoque ecosocial, problemas y desafíos pasados, actuales o futuros de las sociedades contemporáneas señalando sus relaciones de interdependencia y ecodependencia.","saberes":["GEH.3.A.5","GEH.3.C.3"]},{"codigo":"3.3","competencia":"CE3","texto":"Utilizar secuencias cronológicas complejas en las que identificar, comparar y relacionar hechos y procesos en diferentes períodos y lugares históricos (simultaneidad, duración, causalidad), utilizando términos y conceptos del ámbito de la Historia y de la Geografía.","saberes":["GEH.3.B.2"]},{"codigo":"3.4","competencia":"CE3","texto":"Analizar procesos de cambio histórico y comparar casos del ámbito de la Historia y la Geografía a través del uso de fuentes de información diversas, teniendo en cuenta las transformaciones de corta y larga duración (coyuntura y estructura), las continuidades y permanencias en diferentes períodos y lugares.","saberes":["GEH.3.A.2","GEH.3.B.1"]},{"codigo":"4.1","competencia":"CE4","texto":"Identificar los elementos del entorno y conocer su funcionamiento como un sistema complejo por medio del análisis multicausal de sus relaciones naturales y humanas, presentes y pasadas, investigando sobre el grado de conservación y de equilibrio dinámico.","saberes":["GEH.3.A.4","GEH.3.C.1"]},{"codigo":"4.2","competencia":"CE4","texto":"Identificar comportamientos y acciones que contribuyan a la conservación y mejora del entorno natural, rural y urbano, a través del respeto a todos los seres vivos, mostrando comportamientos orientados al logro de un desarrollo sostenible de dichos entornos, y comprendiendo el acceso universal, justo y equitativo a los recursos que nos ofrece el planeta.","saberes":["GEH.3.A.2","GEH.3.B.4","GEH.3.B.5","GEH.3.C.3","GEH.3.C.4"]},{"codigo":"5.1","competencia":"CE5","texto":"Conocer, valorar y ejercitar responsabilidades, derechos y deberes y dar ejemplos en favor de su desarrollo y afirmación a través del conocimiento de nuestro ordenamiento jurídico y constitucional, la comprensión y puesta en valor de nuestra memoria democrática y de la contribución de los hombres y mujeres a la misma, y la defensa de nuestros valores constitucionales.","saberes":["GEH.3.B.8","GEH.3.C.6","GEH.3.C.9"]},{"codigo":"5.2","competencia":"CE5","texto":"Reconocer movimientos y causas que generen una conciencia solidaria, promuevan la cohesión social, y trabajen para la eliminación de la desigualdad, especialmente la motivada por cuestión de género, y el pleno desarrollo de la ciudadanía, mediante el trabajo en equipo, la mediación y resolución pacífica de conflictos.","saberes":["GEH.3.A.7","GEH.3.B.6","GEH.3.C.6","GEH.3.C.9","GEH.3.C.10"]},{"codigo":"6.1","competencia":"CE6","texto":"Investigar acerca de actitudes discriminatorias y reconocer la riqueza de la diversidad, a partir del análisis de la relación entre los aspectos geográficos, históricos, ecosociales y culturales que han conformado la sociedad globalizada y multicultural actual, y el conocimiento de la aportación de los movimientos en defensa de los derechos de las minorías y en favor de la inclusión y la igualdad real, especialmente de las mujeres y de otros colectivos discriminados.","saberes":["GEH.3.A.2","GEH.3.A.7","GEH.3.A.8","GEH.3.A.9","GEH.3.B.4","GEH.3.B.5"]},{"codigo":"6.2","competencia":"CE6","texto":"Contribuir al bienestar individual y colectivo a través del diseño y exposición de iniciativas orientadas a promover un compromiso activo con los valores comunes, la mejora del entorno y el servicio a la comunidad.","saberes":["GEH.3.C.5","GEH.3.C.7"]},{"codigo":"7.1","competencia":"CE7","texto":"Reconocer los rasgos que van conformando la identidad propia y de los demás, la riqueza de las identidades múltiples en relación con distintas escalas espaciales, a través de la iniciación en la investigación y el análisis guiado de sus fundamentos geográficos, históricos, artísticos, ideológicos y lingüísticos, y el reconocimiento de sus expresiones culturales.","saberes":["GEH.3.A.9","GEH.3.B.1"]},{"codigo":"7.2","competencia":"CE7","texto":"Conocer y contribuir a conservar el patrimonio material e inmaterial común, respetar los sentimientos de pertenencia adoptando compromisos en su entorno más cercano con principios y acciones orientadas a la cohesión y solidaridad territorial de la comunidad política, los valores del europeísmo y de la Declaración Universal de los Derechos Humanos.","saberes":["GEH.3.C.1","GEH.3.C.2","GEH.3.C.8","GEH.3.C.13"]},{"codigo":"8.1","competencia":"CE8","texto":"Adoptar un papel activo y comprometido con el entorno, de acuerdo a aptitudes, aspiraciones, intereses y valores propios, a partir de la iniciación guiada en el análisis crítico de la realidad económica, de la distribución y gestión del trabajo, y la adopción de hábitos responsables, saludables, sostenibles y respetuosos con la dignidad humana y la de otros seres vivos, así como de la reflexión ética ante los usos de la tecnología y la gestión del tiempo libre.","saberes":["GEH.3.A.7","GEH.3.B.5","GEH.3.C.5","GEH.3.C.10","GEH.3.C.12"]},{"codigo":"8.2","competencia":"CE8","texto":"Identificar las iniciativas de la sociedad civil, reflejadas en asociaciones y entidades sociales, adoptando actitudes de participación y transformación en el ámbito local y comunitario, especialmente en el ámbito de las relaciones intergeneracionales.","saberes":["GEH.3.C.6","GEH.3.C.7","GEH.3.C.11","GEH.3.C.12"]},{"codigo":"9.1","competencia":"CE9","texto":"Interpretar y explicar de forma argumentada la conexión de España con los grandes procesos históricos de la época contemporánea, valorando lo que han supuesto para su evolución y señalando las aportaciones de sus habitantes a lo largo de la historia, así como las aportaciones del Estado y sus instituciones a la cultura europea y mundial.","saberes":["GEH.3.B.6","GEH.3.B.7","GEH.3.B.8","GEH.3.C.14"]},{"codigo":"9.2","competencia":"CE9","texto":"Contribuir desde su entorno más cercano a la consecución de un mundo más seguro, justo, solidario y sostenible, a través del análisis guiado y el reconocimiento de los compromisos internacionales de nuestro país y de Andalucía, en favor de la paz, la seguridad, la cooperación, la sostenibilidad, los valores democráticos y los Objetivos de Desarrollo Sostenible.","saberes":["GEH.3.A.6","GEH.3.C.8","GEH.3.C.9","GEH.3.C.14"]}],"saberes":[{"codigo":"GEH.3.A.1","bloque":"A. Retos del mundo actual","texto":"Objetivos de Desarrollo Sostenible. Emergencia climática y sostenibilidad. Relación entre factores naturales y antrópicos en la Tierra. Globalización, movimientos migratorios e interculturalidad. Los avances tecnológicos y la conciencia ecosocial. Conflictos ideológicos y etnoculturales. Andalucía en el espacio global."},{"codigo":"GEH.3.A.2","bloque":"A. Retos del mundo actual","texto":"Sociedad de la información. Búsqueda, tratamiento de la información, uso de datos en entornos digitales y evaluación y contraste de la fiabilidad de las fuentes. El problema de la desinformación. Uso específico del léxico relativo a los ámbitos histórico, artístico y geográfico."},{"codigo":"GEH.3.A.3","bloque":"A. Retos del mundo actual","texto":"Cultura mediática. Técnicas y métodos de las Ciencias Sociales: análisis de textos, interpretación y elaboración de mapas, esquemas y síntesis, representación de gráficos e interpretación de imágenes a través de medios digitales accesibles. Tecnologías de la información geográfica."},{"codigo":"GEH.3.A.4","bloque":"A. Retos del mundo actual","texto":"Lo global y lo local. La investigación en Ciencias Sociales, el estudio multicausal y el análisis comparado del espacio natural, rural y urbano, su evolución y los retos de futuro. Análisis e interpretación de conceptos espaciales: localización, escala, conexión y proximidad espacial."},{"codigo":"GEH.3.A.5","bloque":"A. Retos del mundo actual","texto":"Estructuras económicas en el mundo actual, cambios en los sectores productivos y funcionamiento de los mercados. Dilemas e incertidumbres ante el crecimiento, la empleabilidad y la sustentabilidad. Sectores productivos en Andalucía."},{"codigo":"GEH.3.A.6","bloque":"A. Retos del mundo actual","texto":"Geopolítica y principales conflictos en el presente. Genocidios y crímenes contra la humanidad. Guerras, terrorismo y otras formas de violencia política. Alianzas e instituciones internacionales, mediación y misiones de paz. Injerencia humanitaria y Justicia Universal. El papel de las ONG."},{"codigo":"GEH.3.A.7","bloque":"A. Retos del mundo actual","texto":"Desigualdad e injusticia en el contexto local y global. Solidaridad, cohesión social y cooperación para el desarrollo."},{"codigo":"GEH.3.A.8","bloque":"A. Retos del mundo actual","texto":"Igualdad de género y formas de violencia contra las mujeres. Actitudes y comportamientos sexistas."},{"codigo":"GEH.3.A.9","bloque":"A. Retos del mundo actual","texto":"Diversidad social, etnocultural y de género. Migraciones, multiculturalidad y mestizaje en sociedades abiertas. Historia y reconocimiento del pueblo gitano y otras minorías étnicas de nuestro país. Nuevas formas de identificación cultural. Andalucía diversa y multicultural."},{"codigo":"GEH.3.B.1","bloque":"B. Sociedades y territorios","texto":"Métodos de investigación en el ámbito de la Geografía y de la Historia. Metodologías del pensamiento histórico y del pensamiento geográfico."},{"codigo":"GEH.3.B.2","bloque":"B. Sociedades y territorios","texto":"Tiempo histórico: construcción e interpretación de líneas del tiempo a través de la linealidad, cronología, simultaneidad y duración."},{"codigo":"GEH.3.B.3","bloque":"B. Sociedades y territorios","texto":"Conciencia histórica. Elaboración de juicios propios y argumentados ante problemas de actualidad contextualizados históricamente. Defensa y exposición crítica de los mismos a través de presentaciones y debates."},{"codigo":"GEH.3.B.4","bloque":"B. Sociedades y territorios","texto":"Interpretación del sistema capitalista desde sus orígenes hasta la actualidad. Colonialismo, imperialismo y nuevas subordinaciones económicas y culturales."},{"codigo":"GEH.3.B.5","bloque":"B. Sociedades y territorios","texto":"La transformación humana del territorio y la distribución desigual de los recursos y del trabajo. Evolución de los sistemas económicos, de los ciclos demográficos, de los modos de vida y de los modelos de organización social. La lucha por los derechos laborales y sociales: el estado del bienestar. Los servicios públicos en Andalucía."},{"codigo":"GEH.3.B.6","bloque":"B. Sociedades y territorios","texto":"Interpretación del territorio y del paisaje. Del éxodo rural a la concentración urbana. El reto demográfico en España y Andalucía. Evolución, distribución, dinámica y estructura de la población española y andaluza. El problema de la despoblación rural. Ordenación del territorio y transformación del espacio. La ciudad como espacio de convivencia. Importancia y cuidado del espacio público. La huella humana y la protección del medio natural. Proceso de urbanización y sistema de ciudades en Andalucía."},{"codigo":"GEH.3.B.7","bloque":"B. Sociedades y territorios","texto":"El proceso de construcción europea. Integración económica, monetaria y ciudadana. Las instituciones europeas. El futuro de Europa. Andalucía en Europa."},{"codigo":"GEH.3.B.8","bloque":"B. Sociedades y territorios","texto":"La transición española desde 1975 a 1978. La ley como contrato social. De la Constitución de 1812 a la Constitución de 1978. Los valores y principios constitucionales. Ordenamiento normativo autonómico, constitucional y supranacional como garante del desarrollo de derechos y libertades para el ejercicio de la ciudadanía. Blas Infante y el andalucismo. El estatuto de Andalucía. Las instituciones andaluzas. Ordenación territorial de Andalucía."},{"codigo":"GEH.3.C.1","bloque":"C. Compromiso cívico local y global","texto":"Dignidad humana y derechos universales. Declaración Universal de los Derechos Humanos."},{"codigo":"GEH.3.C.2","bloque":"C. Compromiso cívico local y global","texto":"Diversidad social y multiculturalidad. Integración y cohesión social."},{"codigo":"GEH.3.C.3","bloque":"C. Compromiso cívico local y global","texto":"Responsabilidad ecosocial. Compromiso y acción ante los Objetivos del Desarrollo Sostenible. La juventud andaluza como agente de cambio para el desarrollo sostenible."},{"codigo":"GEH.3.C.4","bloque":"C. Compromiso cívico local y global","texto":"Implicación en la defensa y protección del medioambiente. Acción y posición ante la emergencia climática. La protección medioambiental en Andalucía."},{"codigo":"GEH.3.C.5","bloque":"C. Compromiso cívico local y global","texto":"Ciudadanía ética digital. Nuevos comportamientos en la sociedad de la información. Lucha contra el ciberacoso."},{"codigo":"GEH.3.C.6","bloque":"C. Compromiso cívico local y global","texto":"Compromiso cívico y participación ciudadana. Mediación y gestión pacífica de conflictos y apoyo a las víctimas de cualquier forma de violencia y terrorismo."},{"codigo":"GEH.3.C.7","bloque":"C. Compromiso cívico local y global","texto":"Servicio a la comunidad. La corresponsabilidad en los cuidados. Las relaciones intergeneracionales. La responsabilidad colectiva e individual. El asociacionismo y el voluntariado. Entornos y redes sociales."},{"codigo":"GEH.3.C.8","bloque":"C. Compromiso cívico local y global","texto":"El patrimonio como bien común y como recurso cultural y económico. Necesidad de su conocimiento, valoración, conservación, puesta en valor, difusión y gestión de la riqueza patrimonial andaluza."},{"codigo":"GEH.3.C.9","bloque":"C. Compromiso cívico local y global","texto":"Cohesión social e integración. Medidas y acciones en favor de la igualdad y de la plena inclusión."},{"codigo":"GEH.3.C.10","bloque":"C. Compromiso cívico local y global","texto":"La igualdad real de mujeres y hombres. La discriminación por motivo de diversidad sexual y de género. La conquista de derechos en las sociedades democráticas contemporáneas. El camino hacia la igualdad en Andalucía."},{"codigo":"GEH.3.C.11","bloque":"C. Compromiso cívico local y global","texto":"Las emociones y el contexto cultural. La perspectiva histórica del componente emocional."},{"codigo":"GEH.3.C.12","bloque":"C. Compromiso cívico local y global","texto":"Empleo y trabajo en la sociedad de la información, aprendizaje permanente y a lo largo de toda la vida."},{"codigo":"GEH.3.C.13","bloque":"C. Compromiso cívico local y global","texto":"Los valores del europeísmo. Fórmulas de participación en programas educativos europeos."},{"codigo":"GEH.3.C.14","bloque":"C. Compromiso cívico local y global","texto":"Instituciones del Estado que garantizan la seguridad integral y la convivencia social. Los compromisos internacionales de nuestro país en favor de la paz, la seguridad y la cooperación internacional."}],"id":"eso3_geh"},"eso4_geh":{"meta":{"comunidad":"Andalucía","etapa":"ESO","curso":"4.º ESO","materia":"Geografía e Historia","norma":"Orden de 30 de mayo de 2023","fuente":"BOJA núm. 104, de 2 de junio de 2023, Anexos II y III","url":"https://www.juntadeandalucia.es/boja/2023/104/36","status":"resumen_operativo"},"niveles":[{"valor":4,"nota":10,"nombre":"Excelente"},{"valor":3,"nota":7.5,"nombre":"Adecuado"},{"valor":2,"nota":5,"nombre":"En proceso"},{"valor":1,"nota":2.5,"nombre":"Inicial"}],"competencias":[{"codigo":"CE1","texto":"Buscar, seleccionar, tratar y organizar información sobre temas relevantes del presente y del pasado, usando críticamente fuentes históricas y geográficas, para adquirir conocimientos, elaborar y expresar contenidos en varios formatos.","descriptores":["CCL2","CCL3","STEM4","CD1","CD2","CC1"]},{"codigo":"CE2","texto":"Indagar, argumentar y elaborar productos propios sobre problemas geográficos, históricos y sociales que resulten relevantes en la actualidad, desde lo local a lo global, para desarrollar un pensamiento crítico, respetuoso con las diferencias, que contribuya a la construcción de la propia identidad y a enriquecer el acervo común.","descriptores":["CCL1","CCL2","CD2","CC1","CC3","CE3","CCEC3"]},{"codigo":"CE3","texto":"Conocer los principales desafíos a los que se han enfrentado distintas sociedades a lo largo del tiempo, identificando las causas y consecuencias de los cambios producidos y los problemas a los que se enfrentan en la actualidad, mediante el desarrollo de proyectos de investigación y el uso de fuentes fiables, para realizar propuestas que contribuyan al desarrollo sostenible.","descriptores":["STEM3","STEM4","STEM5","CPSAA3","CC3","CC4","CE1","CCEC1"]},{"codigo":"CE4","texto":"Identificar y analizar los elementos del paisaje y su articulación en sistemas complejos naturales, rurales y urbanos, así como su evolución en el tiempo, interpretando las causas de las transformaciones y valorando el grado de equilibrio existente en los distintos ecosistemas, para promover su conservación, mejora y uso sostenible.","descriptores":["CPSAA2","CC1","CC2","CC3","CC4","CE1"]},{"codigo":"CE5","texto":"Analizar de forma crítica planteamientos históricos y geográficos explicando la construcción de los sistemas democráticos y los principios constitucionales que rigen la vida en comunidad, así como asumiendo los deberes y derechos propios de nuestro marco de convivencia, para promover la participación ciudadana y la cohesión social.","descriptores":["CCL5","CC1","CC2","CCEC1"]},{"codigo":"CE6","texto":"Comprender los procesos geográficos, históricos y culturales que han conformado la realidad multicultural en la que vivimos, conociendo y difundiendo la historia y cultura de las minorías étnicas presentes en nuestro país, y valorando la aportación de los movimientos en defensa de la igualdad y la inclusión, para reducir estereotipos, evitar cualquier tipo de discriminación y violencia, y reconocer la riqueza de la diversidad.","descriptores":["CCL5","CPSAA3","CC1","CC2","CC3","CCEC1"]},{"codigo":"CE7","texto":"Identificar los fundamentos que sostienen las diversas identidades propias y las ajenas, a través del conocimiento y puesta en valor del patrimonio material e inmaterial que compartimos para conservarlo y respetar los sentimientos de pertenencia, así como para favorecer procesos que contribuyan a la cohesión y solidaridad territorial en orden a los valores del europeísmo y de la Declaración Universal de los Derechos Humanos.","descriptores":["CP3","CPSAA1","CC1","CC2","CC3","CCEC1"]},{"codigo":"CE8","texto":"Tomar conciencia del papel de los ciclos demográficos, el ciclo vital, las formas de vida y las relaciones intergeneracionales y de dependencia en la sociedad actual y su evolución a lo largo del tiempo, analizándolas de forma crítica, para promover alternativas saludables, sostenibles, enriquecedoras y respetuosas con la dignidad humana y el compromiso con la sociedad y el entorno.","descriptores":["STEM5","CD4","CPSAA2","CPSAA5","CC1","CC2","CC3"]},{"codigo":"CE9","texto":"Conocer y valorar la importancia de la seguridad integral ciudadana en la cultura de la convivencia internacional, de nuestro país y de Andalucía, destacando la contribución del Estado, sus instituciones y otras entidades sociales, a la paz, a la cooperación internacional y al desarrollo sostenible, para promover la consecución de un mundo más seguro, solidario, sostenible y justo.","descriptores":["CCL2","CC1","CC2","CC3","CC4","CE1","CCEC1"]}],"criterios":[{"codigo":"1.1","competencia":"CE1","texto":"Elaborar contenidos propios en distintos formatos, mediante aplicaciones y estrategias de recogida y representación de datos sencillas, aprendiendo a usar y contrastar críticamente fuentes fiables, tanto analógicas como digitales, del presente y de la historia contemporánea, identificando la desinformación y la manipulación.","saberes":["GEH.4.A.2","GEH.4.A.3"]},{"codigo":"1.2","competencia":"CE1","texto":"Establecer conexiones y relaciones básicas entre los conocimientos e informaciones adquiridos, elaborando síntesis explicativas sencillas, mediante informes, estudios o dosieres informativos, que reflejen un dominio de los contenidos tratados.","saberes":["GEH.4.A.3"]},{"codigo":"1.3","competencia":"CE1","texto":"Transferir de manera sencilla la información y el conocimiento por medio de narraciones, pósteres, presentaciones, exposiciones orales, medios audiovisuales y otros productos.","saberes":["GEH.4.A.3"]},{"codigo":"2.1","competencia":"CE2","texto":"Generar productos originales y creativos sencillos mediante la organización de conocimientos previos utilizando herramientas de investigación sencillas que permitan explicar problemas presentes y pasados de la humanidad a distintas escalas temporales y espaciales, partiendo del entorno más cercano, utilizando conceptos, situaciones y datos relevantes.","saberes":["GEH.4.A.3","GEH.4.A.4","GEH.4.B.1"]},{"codigo":"2.2","competencia":"CE2","texto":"Construir la propia identidad y enriquecer el acervo común en el contexto del mundo actual, de sus retos y conflictos, desde una perspectiva sistémica y global, iniciándose en la producción y expresión discursiva y abierta al diálogo de juicios y planteamientos personales, críticos y argumentados.","saberes":["GEH.4.B.3"]},{"codigo":"3.1","competencia":"CE3","texto":"Conocer los Objetivos de Desarrollo Sostenible, planteando propuestas que contribuyan a su logro, aplicando métodos y proyectos de investigación, incidiendo en el uso de mapas y otras representaciones gráficas, así como de medios accesibles de interpretación de imágenes.","saberes":["GEH.4.A.1","GEH.4.A.3"]},{"codigo":"3.2","competencia":"CE3","texto":"Identificar, desde un enfoque ecosocial, problemas y desafíos pasados, actuales o futuros de las sociedades contemporáneas señalando sus relaciones de interdependencia y ecodependencia.","saberes":["GEH.4.A.5","GEH.4.C.3"]},{"codigo":"3.3","competencia":"CE3","texto":"Utilizar secuencias cronológicas complejas en las que identificar, comparar y relacionar hechos y procesos en diferentes períodos y lugares históricos (simultaneidad, duración, causalidad), utilizando términos y conceptos del ámbito de la Historia y de la Geografía.","saberes":["GEH.4.B.2"]},{"codigo":"3.4","competencia":"CE3","texto":"Analizar procesos de cambio histórico y comparar casos del ámbito de la Historia y la Geografía a través del uso de fuentes de información diversas, teniendo en cuenta las transformaciones de corta y larga duración (coyuntura y estructura), las continuidades y permanencias en diferentes períodos y lugares.","saberes":["GEH.4.A.2","GEH.4.B.1"]},{"codigo":"4.1","competencia":"CE4","texto":"Identificar los elementos del entorno y conocer su funcionamiento como un sistema complejo por medio del análisis multicausal de sus relaciones naturales y humanas, presentes y pasadas, investigando sobre el grado de conservación y de equilibrio dinámico.","saberes":["GEH.4.A.4","GEH.4.C.1"]},{"codigo":"4.2","competencia":"CE4","texto":"Identificar comportamientos y acciones que contribuyan a la conservación y mejora del entorno natural, rural y urbano, a través del respeto a todos los seres vivos, mostrando comportamientos orientados al logro de un desarrollo sostenible de dichos entornos, y comprendiendo el acceso universal, justo y equitativo a los recursos que nos ofrece el planeta.","saberes":["GEH.4.A.2","GEH.4.B.4","GEH.4.B.5","GEH.4.C.3","GEH.4.C.4"]},{"codigo":"5.1","competencia":"CE5","texto":"Conocer, valorar y ejercitar responsabilidades, derechos y deberes y dar ejemplos en favor de su desarrollo y afirmación a través del conocimiento de nuestro ordenamiento jurídico y constitucional, la comprensión y puesta en valor de nuestra memoria democrática y de la contribución de los hombres y mujeres a la misma, y la defensa de nuestros valores constitucionales.","saberes":["GEH.4.B.8","GEH.4.C.6","GEH.4.C.9"]},{"codigo":"5.2","competencia":"CE5","texto":"Reconocer movimientos y causas que generen una conciencia solidaria, promuevan la cohesión social, y trabajen para la eliminación de la desigualdad, especialmente la motivada por cuestión de género, y el pleno desarrollo de la ciudadanía, mediante el trabajo en equipo, la mediación y resolución pacífica de conflictos.","saberes":["GEH.4.A.7","GEH.4.B.6","GEH.4.C.6","GEH.4.C.9","GEH.4.C.10"]},{"codigo":"6.1","competencia":"CE6","texto":"Investigar acerca de actitudes discriminatorias y reconocer la riqueza de la diversidad, a partir del análisis de la relación entre los aspectos geográficos, históricos, ecosociales y culturales que han conformado la sociedad globalizada y multicultural actual, y el conocimiento de la aportación de los movimientos en defensa de los derechos de las minorías y en favor de la inclusión y la igualdad real, especialmente de las mujeres y de otros colectivos discriminados.","saberes":["GEH.4.A.2","GEH.4.A.7","GEH.4.A.8","GEH.4.A.9","GEH.4.B.4","GEH.4.B.5"]},{"codigo":"6.2","competencia":"CE6","texto":"Contribuir al bienestar individual y colectivo a través del diseño y exposición de iniciativas orientadas a promover un compromiso activo con los valores comunes, la mejora del entorno y el servicio a la comunidad.","saberes":["GEH.4.C.5","GEH.4.C.7"]},{"codigo":"7.1","competencia":"CE7","texto":"Reconocer los rasgos que van conformando la identidad propia y de los demás, la riqueza de las identidades múltiples en relación con distintas escalas espaciales, a través de la iniciación en la investigación y el análisis guiado de sus fundamentos geográficos, históricos, artísticos, ideológicos y lingüísticos, y el reconocimiento de sus expresiones culturales.","saberes":["GEH.4.A.9","GEH.4.B.1"]},{"codigo":"7.2","competencia":"CE7","texto":"Conocer y contribuir a conservar el patrimonio material e inmaterial común, respetar los sentimientos de pertenencia adoptando compromisos en su entorno más cercano con principios y acciones orientadas a la cohesión y solidaridad territorial de la comunidad política, los valores del europeísmo y de la Declaración Universal de los Derechos Humanos.","saberes":["GEH.4.C.1","GEH.4.C.2","GEH.4.C.8","GEH.4.C.13"]},{"codigo":"8.1","competencia":"CE8","texto":"Adoptar un papel activo y comprometido con el entorno, de acuerdo a aptitudes, aspiraciones, intereses y valores propios, a partir de la iniciación guiada en el análisis crítico de la realidad económica, de la distribución y gestión del trabajo, y la adopción de hábitos responsables, saludables, sostenibles y respetuosos con la dignidad humana y la de otros seres vivos, así como de la reflexión ética ante los usos de la tecnología y la gestión del tiempo libre.","saberes":["GEH.4.A.7","GEH.4.B.5","GEH.4.C.5","GEH.4.C.10","GEH.4.C.12"]},{"codigo":"8.2","competencia":"CE8","texto":"Identificar las iniciativas de la sociedad civil, reflejadas en asociaciones y entidades sociales, adoptando actitudes de participación y transformación en el ámbito local y comunitario, especialmente en el ámbito de las relaciones intergeneracionales.","saberes":["GEH.4.C.6","GEH.4.C.7","GEH.4.C.11","GEH.4.C.12"]},{"codigo":"9.1","competencia":"CE9","texto":"Interpretar y explicar de forma argumentada la conexión de España con los grandes procesos históricos de la época contemporánea, valorando lo que han supuesto para su evolución y señalando las aportaciones de sus habitantes a lo largo de la historia, así como las aportaciones del Estado y sus instituciones a la cultura europea y mundial.","saberes":["GEH.4.B.6","GEH.4.B.7","GEH.4.B.8","GEH.4.C.14"]},{"codigo":"9.2","competencia":"CE9","texto":"Contribuir desde su entorno más cercano a la consecución de un mundo más seguro, justo, solidario y sostenible, a través del análisis guiado y el reconocimiento de los compromisos internacionales de nuestro país y de Andalucía, en favor de la paz, la seguridad, la cooperación, la sostenibilidad, los valores democráticos y los Objetivos de Desarrollo Sostenible.","saberes":["GEH.4.A.6","GEH.4.C.8","GEH.4.C.9","GEH.4.C.14"]}],"saberes":[{"codigo":"GEH.4.A.1","bloque":"A. Retos del mundo actual","texto":"Objetivos de Desarrollo Sostenible. Emergencia climática y sostenibilidad. Relación entre factores naturales y antrópicos en la Tierra. Globalización, movimientos migratorios e interculturalidad. Los avances tecnológicos y la conciencia ecosocial. Conflictos ideológicos y etnoculturales. Andalucía en el espacio global."},{"codigo":"GEH.4.A.2","bloque":"A. Retos del mundo actual","texto":"Sociedad de la información. Búsqueda, tratamiento de la información, uso de datos en entornos digitales y evaluación y contraste de la fiabilidad de las fuentes. El problema de la desinformación. Uso específico del léxico relativo a los ámbitos histórico, artístico y geográfico."},{"codigo":"GEH.4.A.3","bloque":"A. Retos del mundo actual","texto":"Cultura mediática. Técnicas y métodos de las Ciencias Sociales: análisis de textos, interpretación y elaboración de mapas, esquemas y síntesis, representación de gráficos e interpretación de imágenes a través de medios digitales accesibles. Tecnologías de la información geográfica."},{"codigo":"GEH.4.A.4","bloque":"A. Retos del mundo actual","texto":"Lo global y lo local. La investigación en Ciencias Sociales, el estudio multicausal y el análisis comparado del espacio natural, rural y urbano, su evolución y los retos de futuro. Análisis e interpretación de conceptos espaciales: localización, escala, conexión y proximidad espacial."},{"codigo":"GEH.4.A.5","bloque":"A. Retos del mundo actual","texto":"Estructuras económicas en el mundo actual, cambios en los sectores productivos y funcionamiento de los mercados. Dilemas e incertidumbres ante el crecimiento, la empleabilidad y la sustentabilidad. Sectores productivos en Andalucía."},{"codigo":"GEH.4.A.6","bloque":"A. Retos del mundo actual","texto":"Geopolítica y principales conflictos en el presente. Genocidios y crímenes contra la humanidad. Guerras, terrorismo y otras formas de violencia política. Alianzas e instituciones internacionales, mediación y misiones de paz. Injerencia humanitaria y Justicia Universal. El papel de las ONG."},{"codigo":"GEH.4.A.7","bloque":"A. Retos del mundo actual","texto":"Desigualdad e injusticia en el contexto local y global. Solidaridad, cohesión social y cooperación para el desarrollo."},{"codigo":"GEH.4.A.8","bloque":"A. Retos del mundo actual","texto":"Igualdad de género y formas de violencia contra las mujeres. Actitudes y comportamientos sexistas."},{"codigo":"GEH.4.A.9","bloque":"A. Retos del mundo actual","texto":"Diversidad social, etnocultural y de género. Migraciones, multiculturalidad y mestizaje en sociedades abiertas. Historia y reconocimiento del pueblo gitano y otras minorías étnicas de nuestro país. Nuevas formas de identificación cultural. Andalucía diversa y multicultural."},{"codigo":"GEH.4.B.1","bloque":"B. Sociedades y territorios","texto":"Métodos de investigación en el ámbito de la Geografía y de la Historia. Metodologías del pensamiento histórico y del pensamiento geográfico."},{"codigo":"GEH.4.B.2","bloque":"B. Sociedades y territorios","texto":"Tiempo histórico: construcción e interpretación de líneas del tiempo a través de la linealidad, cronología, simultaneidad y duración."},{"codigo":"GEH.4.B.3","bloque":"B. Sociedades y territorios","texto":"Conciencia histórica. Elaboración de juicios propios y argumentados ante problemas de actualidad contextualizados históricamente. Defensa y exposición crítica de los mismos a través de presentaciones y debates."},{"codigo":"GEH.4.B.4","bloque":"B. Sociedades y territorios","texto":"Interpretación del sistema capitalista desde sus orígenes hasta la actualidad. Colonialismo, imperialismo y nuevas subordinaciones económicas y culturales."},{"codigo":"GEH.4.B.5","bloque":"B. Sociedades y territorios","texto":"La transformación humana del territorio y la distribución desigual de los recursos y del trabajo. Evolución de los sistemas económicos, de los ciclos demográficos, de los modos de vida y de los modelos de organización social. La lucha por los derechos laborales y sociales: el estado del bienestar. Los servicios públicos en Andalucía."},{"codigo":"GEH.4.B.6","bloque":"B. Sociedades y territorios","texto":"Interpretación del territorio y del paisaje. Del éxodo rural a la concentración urbana. El reto demográfico en España y Andalucía. Evolución, distribución, dinámica y estructura de la población española y andaluza. El problema de la despoblación rural. Ordenación del territorio y transformación del espacio. La ciudad como espacio de convivencia. Importancia y cuidado del espacio público. La huella humana y la protección del medio natural. Proceso de urbanización y sistema de ciudades en Andalucía."},{"codigo":"GEH.4.B.7","bloque":"B. Sociedades y territorios","texto":"El proceso de construcción europea. Integración económica, monetaria y ciudadana. Las instituciones europeas. El futuro de Europa. Andalucía en Europa."},{"codigo":"GEH.4.B.8","bloque":"B. Sociedades y territorios","texto":"La transición española desde 1975 a 1978. La ley como contrato social. De la Constitución de 1812 a la Constitución de 1978. Los valores y principios constitucionales. Ordenamiento normativo autonómico, constitucional y supranacional como garante del desarrollo de derechos y libertades para el ejercicio de la ciudadanía. Blas Infante y el andalucismo. El estatuto de Andalucía. Las instituciones andaluzas. Ordenación territorial de Andalucía."},{"codigo":"GEH.4.C.1","bloque":"C. Compromiso cívico local y global","texto":"Dignidad humana y derechos universales. Declaración Universal de los Derechos Humanos."},{"codigo":"GEH.4.C.2","bloque":"C. Compromiso cívico local y global","texto":"Diversidad social y multiculturalidad. Integración y cohesión social."},{"codigo":"GEH.4.C.3","bloque":"C. Compromiso cívico local y global","texto":"Responsabilidad ecosocial. Compromiso y acción ante los Objetivos del Desarrollo Sostenible. La juventud andaluza como agente de cambio para el desarrollo sostenible."},{"codigo":"GEH.4.C.4","bloque":"C. Compromiso cívico local y global","texto":"Implicación en la defensa y protección del medioambiente. Acción y posición ante la emergencia climática. La protección medioambiental en Andalucía."},{"codigo":"GEH.4.C.5","bloque":"C. Compromiso cívico local y global","texto":"Ciudadanía ética digital. Nuevos comportamientos en la sociedad de la información. Lucha contra el ciberacoso."},{"codigo":"GEH.4.C.6","bloque":"C. Compromiso cívico local y global","texto":"Compromiso cívico y participación ciudadana. Mediación y gestión pacífica de conflictos y apoyo a las víctimas de cualquier forma de violencia y terrorismo."},{"codigo":"GEH.4.C.7","bloque":"C. Compromiso cívico local y global","texto":"Servicio a la comunidad. La corresponsabilidad en los cuidados. Las relaciones intergeneracionales. La responsabilidad colectiva e individual. El asociacionismo y el voluntariado. Entornos y redes sociales."},{"codigo":"GEH.4.C.8","bloque":"C. Compromiso cívico local y global","texto":"El patrimonio como bien común y como recurso cultural y económico. Necesidad de su conocimiento, valoración, conservación, puesta en valor, difusión y gestión de la riqueza patrimonial andaluza."},{"codigo":"GEH.4.C.9","bloque":"C. Compromiso cívico local y global","texto":"Cohesión social e integración. Medidas y acciones en favor de la igualdad y de la plena inclusión."},{"codigo":"GEH.4.C.10","bloque":"C. Compromiso cívico local y global","texto":"La igualdad real de mujeres y hombres. La discriminación por motivo de diversidad sexual y de género. La conquista de derechos en las sociedades democráticas contemporáneas. El camino hacia la igualdad en Andalucía."},{"codigo":"GEH.4.C.11","bloque":"C. Compromiso cívico local y global","texto":"Las emociones y el contexto cultural. La perspectiva histórica del componente emocional."},{"codigo":"GEH.4.C.12","bloque":"C. Compromiso cívico local y global","texto":"Empleo y trabajo en la sociedad de la información, aprendizaje permanente y a lo largo de toda la vida."},{"codigo":"GEH.4.C.13","bloque":"C. Compromiso cívico local y global","texto":"Los valores del europeísmo. Fórmulas de participación en programas educativos europeos."},{"codigo":"GEH.4.C.14","bloque":"C. Compromiso cívico local y global","texto":"Instituciones del Estado que garantizan la seguridad integral y la convivencia social. Los compromisos internacionales de nuestro país en favor de la paz, la seguridad y la cooperación internacional."}],"id":"eso4_geh"},"bach1_hmc":{"id":"bach1_hmc","meta":{"comunidad":"Andalucía","etapa":"Bachillerato","curso":"1.º Bachillerato","materia":"Historia del Mundo Contemporáneo","norma":"Orden de 30 de mayo de 2023","fuente":"BOJA núm. 104, de 2 de junio de 2023","status":"resumen_operativo"},"niveles":[{"valor":4,"nota":10,"nombre":"Excelente"},{"valor":3,"nota":7.5,"nombre":"Adecuado"},{"valor":2,"nota":5,"nombre":"En proceso"},{"valor":1,"nota":2.5,"nombre":"Inicial"}],"competencias":[{"codigo":"CE1","texto":"Reconocer los movimientos, acciones y transformaciones que han contribuido al afianzamiento de la libertad y de los sistemas democráticos en el mundo contemporáneo.","descriptores":[]},{"codigo":"CE2","texto":"Tomar conciencia del grado de violencia, barbarie y destrucción alcanzado por los conflictos contemporáneos y valorar la defensa de la paz y los derechos humanos.","descriptores":[]},{"codigo":"CE3","texto":"Identificar la desigualdad como uno de los principales problemas de las sociedades contemporáneas, analizando sus causas y consecuencias.","descriptores":[]},{"codigo":"CE4","texto":"Comprender la importancia de las identidades colectivas y analizar críticamente nacionalismos, movimientos sociales y procesos de construcción estatal.","descriptores":[]},{"codigo":"CE5","texto":"Identificar y reconocer los principales retos del siglo XXI mediante el análisis de procesos políticos, económicos, sociales y culturales.","descriptores":[]},{"codigo":"CE6","texto":"Valorar el significado histórico del progreso y sus repercusiones sociales, ambientales y territoriales.","descriptores":[]},{"codigo":"CE7","texto":"Interpretar la función de las ideas, ideologías y sistemas de pensamiento en las transformaciones del mundo contemporáneo.","descriptores":[]},{"codigo":"CE8","texto":"Describir y analizar los cambios y permanencias en la sociedad contemporánea incorporando la perspectiva de género y la diversidad social.","descriptores":[]}],"criterios":[{"codigo":"1.1","competencia":"CE1","texto":"Identificar y analizar los procedimientos mediante los que se han conquistado derechos, libertades y sistemas democráticos desde finales del siglo XVIII.","saberes":["HMCO.1.A.1"]},{"codigo":"1.2","competencia":"CE1","texto":"Comparar revoluciones y procesos democratizadores, valorando sus logros, límites y contradicciones.","saberes":["HMCO.1.A.2"]},{"codigo":"2.1","competencia":"CE2","texto":"Analizar las causas, desarrollo y consecuencias de guerras, genocidios y otras formas de violencia política contemporánea.","saberes":["HMCO.1.A.3"]},{"codigo":"2.2","competencia":"CE2","texto":"Valorar iniciativas de paz, justicia internacional, memoria y reparación de las víctimas.","saberes":["HMCO.1.A.4"]},{"codigo":"3.1","competencia":"CE3","texto":"Describir la evolución de los sistemas económicos y de las relaciones laborales y explicar la generación de desigualdades.","saberes":["HMCO.1.A.5"]},{"codigo":"3.2","competencia":"CE3","texto":"Analizar movimientos sociales, sindicales y políticos vinculados a la mejora de las condiciones de vida.","saberes":["HMCO.1.A.6"]},{"codigo":"4.1","competencia":"CE4","texto":"Analizar la formación de naciones y estados y los conflictos asociados a identidades, fronteras e imperios.","saberes":["HMCO.1.A.7"]},{"codigo":"4.2","competencia":"CE4","texto":"Contrastar procesos de descolonización y construcción de nuevos estados.","saberes":["HMCO.1.A.8"]},{"codigo":"5.1","competencia":"CE5","texto":"Investigar retos actuales como globalización, crisis democráticas, migraciones, desigualdad y emergencia climática.","saberes":["HMCO.1.B.1"]},{"codigo":"5.2","competencia":"CE5","texto":"Elaborar argumentos fundamentados utilizando fuentes diversas y datos contrastados.","saberes":["HMCO.1.B.2"]},{"codigo":"6.1","competencia":"CE6","texto":"Valorar críticamente la idea de progreso y sus efectos económicos, sociales y ambientales.","saberes":["HMCO.1.B.3"]},{"codigo":"6.2","competencia":"CE6","texto":"Relacionar innovación científica y tecnológica con cambios en la vida cotidiana y el trabajo.","saberes":["HMCO.1.B.4"]},{"codigo":"7.1","competencia":"CE7","texto":"Reconocer las principales ideologías contemporáneas y su influencia en movimientos, regímenes y conflictos.","saberes":["HMCO.1.B.5"]},{"codigo":"7.2","competencia":"CE7","texto":"Analizar discursos políticos y propagandísticos identificando manipulación y desinformación.","saberes":["HMCO.1.C.1"]},{"codigo":"8.1","competencia":"CE8","texto":"Analizar cambios demográficos, familiares, culturales y de género en las sociedades contemporáneas.","saberes":["HMCO.1.C.2"]},{"codigo":"8.2","competencia":"CE8","texto":"Visibilizar el papel de las mujeres y de grupos tradicionalmente excluidos en los procesos históricos.","saberes":["HMCO.1.C.3"]}],"saberes":[{"codigo":"HMCO.1.A.1","bloque":"Sociedades en el tiempo","texto":"Crisis del Antiguo Régimen y revoluciones liberales."},{"codigo":"HMCO.1.A.2","bloque":"Sociedades en el tiempo","texto":"Industrialización, capitalismo y movimiento obrero."},{"codigo":"HMCO.1.A.3","bloque":"Sociedades en el tiempo","texto":"Nacionalismos, imperialismos y expansión colonial."},{"codigo":"HMCO.1.A.4","bloque":"Sociedades en el tiempo","texto":"La Primera Guerra Mundial y la Revolución rusa."},{"codigo":"HMCO.1.A.5","bloque":"Sociedades en el tiempo","texto":"El periodo de entreguerras, fascismos y crisis de las democracias."},{"codigo":"HMCO.1.A.6","bloque":"Sociedades en el tiempo","texto":"La Segunda Guerra Mundial, genocidios y Holocausto."},{"codigo":"HMCO.1.A.7","bloque":"Sociedades en el tiempo","texto":"Guerra Fría, descolonización y nuevos estados."},{"codigo":"HMCO.1.A.8","bloque":"Sociedades en el tiempo","texto":"El mundo tras 1989 y los retos del siglo XXI."},{"codigo":"HMCO.1.B.1","bloque":"Retos del mundo actual","texto":"Globalización económica, tecnológica y cultural."},{"codigo":"HMCO.1.B.2","bloque":"Retos del mundo actual","texto":"Desigualdad, pobreza y desarrollo."},{"codigo":"HMCO.1.B.3","bloque":"Retos del mundo actual","texto":"Migraciones y sociedades multiculturales."},{"codigo":"HMCO.1.B.4","bloque":"Retos del mundo actual","texto":"Conflictos, seguridad y cultura de paz."},{"codigo":"HMCO.1.B.5","bloque":"Retos del mundo actual","texto":"Emergencia climática y sostenibilidad."},{"codigo":"HMCO.1.C.1","bloque":"Compromiso cívico","texto":"Derechos humanos y memoria democrática."},{"codigo":"HMCO.1.C.2","bloque":"Compromiso cívico","texto":"Ciudadanía global y participación."},{"codigo":"HMCO.1.C.3","bloque":"Compromiso cívico","texto":"Perspectiva de género."},{"codigo":"HMCO.1.C.4","bloque":"Compromiso cívico","texto":"Uso crítico de fuentes y medios digitales."},{"codigo":"HMCO.1.C.5","bloque":"Compromiso cívico","texto":"Compromiso con los Objetivos de Desarrollo Sostenible."}]},"bach1_pcul":{"id":"bach1_pcul","meta":{"comunidad":"Andalucía","etapa":"Bachillerato","curso":"1.º Bachillerato","materia":"Patrimonio Cultural y Artístico de Andalucía","norma":"Orden de 30 de mayo de 2023","fuente":"BOJA núm. 104, de 2 de junio de 2023, Anexos II y III","status":"oficial_completo","origen":"Anexo oficial incorporado en la aplicación"},"niveles":[{"valor":4,"nota":10,"nombre":"Excelente"},{"valor":3,"nota":7.5,"nombre":"Adecuado"},{"valor":2,"nota":5,"nombre":"En proceso"},{"valor":1,"nota":2.5,"nombre":"Inicial"}],"competencias":[{"codigo":"CE1","texto":"Identifica las características del patrimonio natural, urbano, industrial y artístico de la Comunidad Autónoma Andaluza, expresando, de forma oral y escrita y utilizando distintos tipos de soporte, los rasgos más significativos del patrimonio cultural de Andalucía, apreciando las peculiaridades de la cultura e historia andaluzas para la comprensión de la posición y relevancia de Andalucía en el mundo y las formas por las que se ha desarrollado la identidad, la economía y la sociedad andaluza.","descriptores":["CCL1","CCL2","CD1","CC1","CC2","CC3","CCEC1"]},{"codigo":"CE2","texto":"Identifica, describe, expresa y representa gráficamente, mediante diferentes soportes y utilizando la terminología específica, las principales manifestaciones culturales y artísticas de Andalucía y su evolución, comparando los elementos definitorios de los distintos estilos artísticos, valorando su diversidad cultural y artística y comprendiendo la influencia de las corrientes y modelos estéticos de cada época, con el objetivo de comprender y relacionarlos con los principales hitos culturales y artísticos de Andalucía.","descriptores":["CCL1","CCL2","CD1","CD2","CPSAA3.1","CC1","CC3","CCEC1","CCEC2","CCEC4.1"]},{"codigo":"CE3","texto":"Iniciar, planificar, desarrollar y difundir proyectos de investigación sobre las principales manifestaciones culturales y artísticas de Andalucía, por medio de la recopilación de información procedente de una pluralidad de fuentes, organizada, editada y presentada, haciendo uso de tecnologías digitales, describiendo de manera oral o escrita la información obtenida, participando en debates y exposiciones orales, respetando los turnos de palabra y opiniones ajenas, analizando y valorando los puntos de vista distintos al propio y expresando sus argumentos y conclusiones de manera clara y coherente, manifestando una actitud de respeto hacia el patrimonio cultural de Andalucía, dirigido a favorecer la participación activa, la experimentación y un aprendizaje funcional.","descriptores":["CCL1","CCL2","CCL3","CD1","CD2","CPSAA4","CC1","CC3","CCEC1","CCEC3.1"]},{"codigo":"CE4","texto":"Reconoce y comprende la normativa reguladora del Patrimonio Cultural y Artístico de Andalucía y analiza de forma crítica textos y noticias en distintos formatos que la aluden; expone oralmente y por escrito la importancia de su conservación, proponiendo soluciones para frenar su deterioro, y difunde, utilizando recursos digitales, tanto el patrimonio cultural y artístico de Andalucía como las acciones para su conservación y difusión.","descriptores":["CCL1","CCL2","CD1","CD2","CC1","CC3","CCEC1"]}],"criterios":[{"codigo":"1.1","competencia":"CE1","texto":"Distinguir los distintos tipos de patrimonio y de bienes patrimoniales de Andalucía.","saberes":["PCUL.1.A.1","PCUL.1.A.2"]},{"codigo":"1.2","competencia":"CE1","texto":"Analizar y exponer oralmente y por escrito, utilizando distintos tipos de soporte, algunos ejemplos más significativos de distintos tipos de patrimonio.","saberes":["PCUL.1.A.4","PCUL.1.A.6"]},{"codigo":"1.3","competencia":"CE1","texto":"Apreciar las peculiaridades y la diversidad de la cultura e historia andaluzas.","saberes":["PCUL.1.A.4","PCUL.1.A.5","PCUL.1.A.6","PCUL.1.A.7"]},{"codigo":"2.1","competencia":"CE2","texto":"Analizar los grandes conjuntos monumentales y las principales manifestaciones artísticas de Andalucía, identificando las características más destacadas que permiten su clasificación en un determinado estilo artístico.","saberes":["PCUL.1.B.1","PCUL.1.B.3"]},{"codigo":"2.2","competencia":"CE2","texto":"Valorar la diversidad de corrientes o modelos estéticos que pueden desarrollarse en una misma época.","saberes":["PCUL.1.B.4","PCUL.1.B.5"]},{"codigo":"2.3","competencia":"CE2","texto":"Situar en el espacio y en el tiempo las principales manifestaciones artísticas andaluzas y relacionarlas con el contexto en el que se desarrollan.","saberes":["PCUL.1.B.2","PCUL.1.B.5"]},{"codigo":"3.1","competencia":"CE3","texto":"Especificar los rasgos más característicos de las principales manifestaciones culturales y artísticas de Andalucía mediante el contraste con el entorno más inmediato con el fin de seleccionar problemas y objetos de interés o estudio.","saberes":["PCUL.1.C.1","PCUL.1.C.4"]},{"codigo":"3.2","competencia":"CE3","texto":"Participar en proyectos colaborativos para desarrollar producciones de calidad.","saberes":["PCUL.1.C.3","PCUL.1.C.4"]},{"codigo":"3.3","competencia":"CE3","texto":"Utilizar la terminología específica del arte y del estudio del patrimonio en las exposiciones orales y escritas.","saberes":["PCUL.1.A.3","PCUL.1.A.4"]},{"codigo":"3.4","competencia":"CE3","texto":"Advertir la importancia y necesidad de conservación de las fuentes documentales y bibliográficas para comprender el papel de la red de Archivos y Bibliotecas de Andalucía mediante el recurso a las nuevas tecnologías.","saberes":["PCUL.1.A.5","PCUL.1.C.5"]},{"codigo":"3.5","competencia":"CE3","texto":"Considerar el carácter multicultural de la riqueza patrimonial andaluza como base identitaria con el fin de ofrecer una visión integradora que justifique su importancia mediante el uso de recursos documentales y primando el trabajo de campo.","saberes":["PCUL.1.B.7","PCUL.1.B.8","PCUL.1.C.2"]},{"codigo":"3.6","competencia":"CE3","texto":"Debatir y analizar la proyección internacion   if(storageMode!=="indexeddb")return 0;
  var db=await openAppDatabase();
  var tx=db.transaction(["backups"],"readonly");
  var done=transactionFinished(tx);
  var count=await requestResult(tx.objectStore("backups").count());
  await done;
  return count
}
async function clearMigrationBackups(){
  var db=await openAppDatabase();
  var tx=db.transaction(["backups"],"readwrite");
  var done=transactionFinished(tx);
  tx.objectStore("backups").clear();
  await done
}

    }
    if(navigator.storage&&navigator.storage.persisted){
      persistent=(await navigator.storage.persisted())?"Sí":"No"
    }
  }catch(error){}

function formatBytes(bytes){
  if(!bytes)return"0 B";
  var units=["B","KB","MB","GB"],index=Math.min(Math.floor(Math.log(bytes)/Math.log(1024)),units.length-1);
  return(bytes/Math.pow(1024,index)).toFixed(index?1:0)+" "+units[index]
}
async function requestPersistentStorage(){
  if(!navigator.storage||!navigator.storage.persist){
    toast("Este navegador no permite solicitar almacenamiento persistente.");
    return
  }
  try{
    var granted=await navigator.storage.persist();
    toast(granted?"Almacenamiento persistente concedido.":"El navegador no lo ha concedido.");
    updateStoragePanel()
  }catch(error){toast("No se pudo solicitar almacenamiento persistente.")}
}

function configureNativeBackButton(){

    if(!modalBg.hidden){closeModal();return}
    if(view!=='cuaderno'){setView('cuaderno');return}
    if(App.exitApp)App.exitApp()

}
async function startApplication(){
  state=await initializeStorage();
  activeGroup=(state.ui&&state.ui.groupId&&group(state.ui.groupId))?state.ui.groupId:state.groups[0].id;
  activeTerm=(state.ui&&state.ui.term)||"all";
  state.ui.groupId=activeGroup;
  state.ui.term=activeTerm;
  render();
  configureNativeBackButton();
  registerPwa();
  refreshInstallPanel();
  if(START_QUERY.get("nosync")==="1"){
    updateSyncStatus("loading","Sincronización omitida")

}
